name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Enables manual runs

defaults:
  run:
    shell: bash

jobs:
  all:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3.0.0
      - run: brew install zola
      - run: zola build
      - run: cp CNAME public/
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
